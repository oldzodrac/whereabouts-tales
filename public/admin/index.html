<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Content Manager</title>
    <script>
      window.CMS_MANUAL_INIT = true;
    </script>
  </head>
  <body>
    <script>
      window.addEventListener("message", (event) => {
        if (event.data && typeof event.data === 'string' && event.data.startsWith('authorization:github:success:')) {
          const keyData = JSON.parse(event.data.split('authorization:github:success:')[1]);
          localStorage.setItem("decap-cms-user", JSON.stringify({ backendName: "github", token: keyData.token }));
          window.location.reload();
        }
      });
    </script>
    <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
    
    <script>
      CMS.init({
        config: {
          load_config_file: false, // THIS IS THE MAGIC FIX
          backend: {
            name: 'github',
            repo: 'oldzodrac/whereabouts-tales',
            branch: 'main',
            base_url: 'https://whereabouts-tales-552297569132.us-west1.run.app',
            auth_endpoint: '/api/auth'
          },
          site_url: 'https://whereabouts-tales-552297569132.us-west1.run.app',
          display_url: 'https://whereabouts-tales-552297569132.us-west1.run.app',
          media_folder: 'public/images/uploads',
          public_folder: '/images/uploads',
          collections: [
            {
              name: 'episodes',
              label: 'Podcast Episodes',
              folder: 'content/episodes',
              create: true,
              slug: '{{slug}}',
              fields: [
                { label: 'Title', name: 'title', widget: 'string' },
                { label: 'Publish Date', name: 'date', widget: 'datetime' },
                { label: 'YouTube Video ID', name: 'youtubeId', widget: 'string', required: false },
                { label: 'Excerpt', name: 'excerpt', widget: 'text' },
                { label: 'Body', name: 'body', widget: 'markdown' }
              ]
            }
          ]
        }
      });
    </script>
  </body>
</html>
